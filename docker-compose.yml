name: ai-job-platform

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aijob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_job_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aijob-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (local S3-compatible object storage) ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: aijob-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: aijob-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/ai-job-platform-resumes &&
        mc anonymous set download local/ai-job-platform-resumes &&
        echo 'MinIO bucket ready'
      "
    restart: 'no'

  # ── AI Service (Python / FastAPI) ───────────────────────────────────────────
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: aijob-ai
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aijob-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/ai_job_platform?schema=public
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      PORT: 4000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT: http://minio:9000
      AWS_PUBLIC_URL: http://minio:9000
      AWS_PRESIGN_URL: http://localhost:9000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:4000/api/health\",r=>{process.exit(r.statusCode<500?0:1)}).on(\"error\",()=>process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        INTERNAL_API_URL: http://api:4000
    container_name: aijob-web
    restart: unless-stopped
    env_file: .env
    environment:
      INTERNAL_API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /api/v1
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

  # ── Queue Monitor ─────────────────────────────────────────────────────────────
  bull-board:
    image: deadly0/bull-board
    container_name: aijob-bull-board
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3002:3000'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: aijob-network
