name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Deploy Frontend → Netlify ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Netlify)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm turbo run build --filter=@ai-job/web
        env:
          NEXT_PUBLIC_API_URL: /api/v1
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          INTERNAL_API_URL: ${{ secrets.INTERNAL_API_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          DATABASE_URL: postgresql://placeholder/placeholder

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: apps/web/.next
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }}"
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 8

  # ── Deploy Backend → Render ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy API + Worker (Render)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render API deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}" | grep -o '"id":"[^"]*"' || echo "API deploy triggered"

      - name: Trigger Render Worker deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}" | grep -o '"id":"[^"]*"' || echo "Worker deploy triggered"

      - name: Wait for API health (max 3 min)
        run: |
          for i in $(seq 1 18); do
            STATUS=$(curl -sf "${{ secrets.RENDER_API_URL }}/api/health" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then echo "✅ Healthy after ${i}x10s"; exit 0; fi
            echo "⏳ ($i/18) status=$STATUS"; sleep 10
          done
          echo "⚠️ Health check timed out — Render may still be warming up"

  # ── Docker Registry + SSH Deploy (optional VPS/ECS) ───────────────────────
  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    environment: production
    if: ${{ secrets.REGISTRY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - id: meta
        run: echo "VERSION=${GITHUB_REF_NAME:-latest}" >> $GITHUB_OUTPUT

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY }}/aijob-api:${{ steps.meta.outputs.VERSION }},${{ secrets.REGISTRY }}/aijob-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY }}/aijob-web:${{ steps.meta.outputs.VERSION }},${{ secrets.REGISTRY }}/aijob-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            INTERNAL_API_URL=${{ secrets.INTERNAL_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build & push AI Service
        uses: docker/build-push-action@v6
        with:
          context: apps/ai-service
          file: apps/ai-service/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY }}/aijob-ai:${{ steps.meta.outputs.VERSION }},${{ secrets.REGISTRY }}/aijob-ai:latest
          cache-from: type=gha,scope=ai
          cache-to: type=gha,mode=max,scope=ai

      - name: SSH Deploy to VPS
        if: ${{ secrets.DEPLOY_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/ai-job-platform
            export VERSION=${{ steps.meta.outputs.VERSION }} REGISTRY=${{ secrets.REGISTRY }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm api npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f --filter "until=24h"
            echo "🚀 Deployed $VERSION"

  # ── Summary ───────────────────────────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Report
        run: |
          echo "Frontend (Netlify): ${{ needs.deploy-frontend.result }}"
          echo "Backend (Render):   ${{ needs.deploy-backend.result }}"
          if [[ "${{ needs.deploy-frontend.result }}" == "failure" || "${{ needs.deploy-backend.result }}" == "failure" ]]; then
            echo "❌ Deployment failed"
            exit 1
          fi
          echo "🚀 Deployment complete"
