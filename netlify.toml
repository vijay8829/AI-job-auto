# Netlify deployment for Next.js frontend
# Uses @netlify/plugin-nextjs for full SSR/ISR support

[build]
  base    = "apps/web"
  command = "cd ../.. && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@ai-job/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "9"
  # Baked at build time — set these in the Netlify UI under Environment Variables
  NEXT_PUBLIC_API_URL   = "/api/v1"
  NEXT_PUBLIC_APP_URL   = "https://YOUR_NETLIFY_URL.netlify.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Rewrites: proxy /api/v1/* to the Render backend so the browser never calls it directly
[[redirects]]
  from   = "/api/v1/*"
  to     = "https://aijob-api.onrender.com/api/v1/:splat"
  status = 200
  force  = true

  [redirects.headers]
    X-Forwarded-Proto = "https"

# SPA fallback (handled by Next.js plugin — kept for explicit clarity)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
