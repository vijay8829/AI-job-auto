version: '3.9'

name: ai-job-platform-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - internal

  api:
    image: ${REGISTRY}/aijob-api:${VERSION:-latest}
    restart: always
    environment:
      NODE_ENV: production
    env_file: .env.prod
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M

  ai-service:
    image: ${REGISTRY}/aijob-ai:${VERSION:-latest}
    restart: always
    environment:
      NODE_ENV: production
    env_file: .env.prod
    networks:
      - internal
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  web:
    image: ${REGISTRY}/aijob-web:${VERSION:-latest}
    restart: always
    environment:
      NODE_ENV: production
    env_file: .env.prod
    networks:
      - public
    depends_on:
      - api

  worker:
    image: ${REGISTRY}/aijob-api:${VERSION:-latest}
    # worker.ts boots the full NestJS app on WORKER_PORT (4001) — processes all Bull queues
    command: sh -c "exec node apps/api/dist/worker"
    restart: always
    environment:
      NODE_ENV: production
      WORKER_PORT: "4001"
    env_file: .env.prod
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:4001/api/health\",r=>{process.exit(r.statusCode<500?0:1)}).on(\"error\",()=>process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - public
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  internal:
    internal: true
  public:
    driver: bridge
